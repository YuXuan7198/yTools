<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevToolbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fdfbf7;
      --sidebar-bg: #f5f0e8;
      --text: #3d3427;
      --text-secondary: #a09080;
      --accent: #d4a853;
      --accent-hover: #c49a44;
      --border: #e0d8cc;
      --radius: 8px;
      --radius-sm: 6px;
      --font-mono: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      --transition-fade: opacity 150ms ease;
      --shadow-sm: 0 1px 3px rgba(61, 52, 39, 0.06);
      --shadow-md: 0 2px 12px rgba(61, 52, 39, 0.07);
      --output-color: #2d6a4f;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app { height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
